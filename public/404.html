<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // Store the attempted URL path and query string in sessionStorage,
    // then redirect back to the root so the SPA can restore and handle it.
    sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/');
  </script>
</head>
<body>
</body>
</html>
